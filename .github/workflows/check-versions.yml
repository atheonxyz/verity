name: Check Versions

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: versions-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version consistency
        run: bash scripts/check-versions.sh

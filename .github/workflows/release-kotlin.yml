name: Release Kotlin SDK

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publish)"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry run — skipping tag check"
            exit 0
          fi

          TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "::error::Current commit is not tagged v$VERSION (got: '$TAG'). Tag first, then release."
            exit 1
          fi
      - name: Check version consistency
        run: bash scripts/check-versions.sh

  build-and-test:
    needs: validate
    uses: ./.github/workflows/core-build.yml
    with:
      targets: "android"
      provekit-ref: "v1"

  test:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build and test
        run: cd sdks/kotlin && ./gradlew build

  publish:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Publish to Maven Central
        if: ${{ !inputs.dry_run }}
        run: cd sdks/kotlin && ./gradlew publish
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run complete. Would publish v${{ needs.validate.outputs.version }} to Maven Central." >> "$GITHUB_STEP_SUMMARY"

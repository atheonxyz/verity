name: Release Swift SDK

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publish)"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry run — skipping tag check"
            exit 0
          fi

          TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "::error::Current commit is not tagged v$VERSION (got: '$TAG'). Tag first, then release."
            exit 1
          fi
      - name: Check version consistency
        run: bash scripts/check-versions.sh

  build-and-test:
    needs: validate
    uses: ./.github/workflows/core-build.yml
    with:
      targets: "ios"
      provekit-ref: "v1"

  test:
    needs: build-and-test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: |
          cd sdks/swift
          xcodebuild test \
            -scheme Verity \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation

  publish:
    needs: [validate, test]
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Release
        if: ${{ !inputs.dry_run }}
        run: bash sdks/swift/scripts/release.sh v${{ needs.validate.outputs.version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run complete. Would publish v${{ needs.validate.outputs.version }}." >> "$GITHUB_STEP_SUMMARY"

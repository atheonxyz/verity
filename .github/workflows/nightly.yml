name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  rust-matrix:
    strategy:
      fail-fast: false
      matrix:
        toolchain: [nightly-2026-03-04]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - name: Test (${{ matrix.toolchain }})
        run: cd core && cargo test --all-features
      - name: Clippy (${{ matrix.toolchain }})
        run: cd core && cargo clippy --all-targets --all-features -- -D warnings

  core-build:
    uses: ./.github/workflows/core-build.yml
    with:
      targets: "ios,android,wasm,native"
      rust-toolchain: "nightly-2026-03-04"
      provekit-ref: "ash/v1-improve"

  test-swift:
    needs: core-build
    strategy:
      fail-fast: false
      matrix:
        xcode: ["15.4", "16.0"]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}
      - name: Test (Xcode ${{ matrix.xcode }})
        run: |
          cd sdks/swift
          xcodebuild test \
            -scheme Verity \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation

  test-kotlin:
    needs: core-build
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Test (Java ${{ matrix.java }})
        run: cd sdks/kotlin && ./gradlew build

  test-js:
    needs: core-build
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Test (Node ${{ matrix.node }})
        run: |
          cd sdks/js
          npm ci
          npm test

  size-report:
    needs: core-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          merge-multiple: false
      - name: Report sizes
        run: |
          {
            echo "# Nightly Binary Size Report"
            echo ""
            echo "| Artifact | Size |"
            echo "|----------|------|"
          } >> "$GITHUB_STEP_SUMMARY"
          find . -type f \( -name '*.a' -o -name '*.so' -o -name '*.wasm' -o -name '*.xcframework' \) -print0 | sort -z | while IFS= read -r -d '' f; do
            size=$(du -sh "$f" | cut -f1)
            name="${f#./}"
            echo "| \`${name}\` | ${size} |" >> "$GITHUB_STEP_SUMMARY"
          done

  notify:
    if: failure()
    needs: [rust-matrix, test-swift, test-kotlin, test-js]
    runs-on: ubuntu-latest
    steps:
      - name: Nightly failure summary
        run: |
          echo "::error::Nightly build failed. Check workflow run for details."
          {
            echo "# Nightly Failed"
            echo "One or more nightly jobs failed. Investigate immediately."
          } >> "$GITHUB_STEP_SUMMARY"

name: Lint

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "**.sh"
      - "**.yml"
      - "**.yaml"
      - ".editorconfig"
  pull_request:
    paths:
      - "scripts/**"
      - "**.sh"
      - "**.yml"
      - "**.yaml"
      - ".editorconfig"

concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          find . -name '*.sh' -not -path './.omc/*' -not -path '*/target/*' -print0 | \
            xargs -0 shellcheck --severity=warning || true

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: YAML lint
        run: |
          pip install yamllint
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 120}}}' .github/workflows/

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: reviewdog/action-actionlint@v1

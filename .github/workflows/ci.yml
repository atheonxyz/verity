name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      core: ${{ steps.filter.outputs.core }}
      swift: ${{ steps.filter.outputs.swift }}
      kotlin: ${{ steps.filter.outputs.kotlin }}
      js: ${{ steps.filter.outputs.js }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core/**'
              - '!core/deny.toml'
              - 'Makefile'
            swift:
              - 'sdks/swift/**'
            kotlin:
              - 'sdks/kotlin/**'
            js:
              - 'sdks/js/**'

  rust-checks:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-04
          components: clippy, rustfmt
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-check-${{ hashFiles('core/Cargo.lock') }}
      - name: Format check
        run: cd core && cargo fmt --all -- --check
      - name: Clippy
        run: cd core && cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests
        run: cd core && cargo test --all-features

  core-build:
    needs: changes
    if: |
      needs.changes.outputs.core == 'true' ||
      needs.changes.outputs.swift == 'true' ||
      needs.changes.outputs.kotlin == 'true' ||
      needs.changes.outputs.js == 'true'
    uses: ./.github/workflows/core-build.yml
    with:
      targets: "ios,android,wasm,native"
      rust-toolchain: "nightly-2026-03-04"
      provekit-ref: "v1"
      provekit_wasm_ref: "main"

  test-swift:
    needs: [changes, core-build]
    if: needs.changes.outputs.swift == 'true' || needs.changes.outputs.core == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          cd sdks/swift
          xcodebuild test \
            -scheme Verity \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-results
          path: sdks/swift/TestResults.xcresult
          retention-days: 7

  test-kotlin:
    needs: [changes, core-build]
    if: needs.changes.outputs.kotlin == 'true' || needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('sdks/kotlin/**/*.gradle*', 'sdks/kotlin/gradle-wrapper.properties') }}
      - name: Build and lint
        run: cd sdks/kotlin && ./gradlew build lint

  test-js:
    needs: [changes, core-build]
    if: needs.changes.outputs.js == 'true' || needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: core-wasm
          path: output/wasm/
      - name: Provision JS WASM artifacts
        run: |
          mkdir -p sdks/js/wasm
          cp -R output/wasm/provekit/. sdks/js/wasm/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/js/package-lock.json
      - name: Install and test
        run: |
          cd sdks/js
          npm ci
          npm run lint
          npm test

  ci-pass:
    if: always()
    needs: [rust-checks, test-swift, test-kotlin, test-js]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.rust-checks.result }}" "${{ needs.test-swift.result }}" "${{ needs.test-kotlin.result }}" "${{ needs.test-js.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip all publishing)"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry run — skipping tag check"
            exit 0
          fi

          TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "::error::Current commit is not tagged v$VERSION (got: '$TAG'). Tag first, then release."
            exit 1
          fi
      - name: Check version consistency
        run: bash scripts/check-versions.sh

  # ── Build all targets in parallel ──────────────────────────────

  build:
    needs: validate
    uses: ./.github/workflows/core-build.yml
    with:
      targets: "ios,android,wasm,native"
      provekit-ref: "v1"
      provekit_wasm_ref: "main"

  # ── Test all SDKs ──────────────────────────────────────────────

  test-swift:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test Swift SDK
        run: |
          cd sdks/swift
          xcodebuild test \
            -scheme Verity \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation

  test-kotlin:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Test Kotlin SDK
        run: cd sdks/kotlin && ./gradlew build

  test-js:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: core-wasm
          path: output/wasm/
      - name: Provision JS WASM artifacts
        run: |
          mkdir -p sdks/js/wasm
          cp -R output/wasm/provekit/. sdks/js/wasm/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Test JS SDK
        run: |
          cd sdks/js
          npm ci
          npm run lint
          npm test

  # ── Publish all SDKs ───────────────────────────────────────────

  publish-swift:
    needs: [validate, build, test-swift]
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: core-ios
          path: output/
      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="v${{ needs.validate.outputs.version }}"
          cd output
          zip -r Verity.xcframework.zip Verity.xcframework
          cd ..
          gh release create "$VERSION" output/Verity.xcframework.zip \
            --title "$VERSION" \
            --notes "Verity $VERSION — pre-built XCFramework (iOS) with all backends"
          rm -f output/Verity.xcframework.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run — would publish Swift SDK v${{ needs.validate.outputs.version }} to GitHub Releases." >> "$GITHUB_STEP_SUMMARY"

  publish-kotlin:
    needs: [validate, build, test-kotlin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: core-android
          path: sdks/kotlin/src/main/jniLibs/
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Publish to Maven Central
        if: ${{ !inputs.dry_run }}
        run: |
          cd sdks/kotlin
          ./gradlew publish \
            -Pversion="${{ needs.validate.outputs.version }}"
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run — would publish Kotlin SDK v${{ needs.validate.outputs.version }} to Maven Central." >> "$GITHUB_STEP_SUMMARY"

  publish-js:
    needs: [validate, build, test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: core-wasm
          path: output/wasm/
      - name: Provision JS WASM artifacts
        run: |
          mkdir -p sdks/js/wasm
          cp -R output/wasm/provekit/. sdks/js/wasm/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          cd sdks/js
          npm ci
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run — would publish JS SDK v${{ needs.validate.outputs.version }} to npm." >> "$GITHUB_STEP_SUMMARY"

  # ── Post-release: update Package.swift checksums ───────────────

  post-release:
    if: always() && needs.publish-swift.result == 'success'
    needs: [validate, publish-swift, publish-kotlin, publish-js]
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: core-ios
          path: output/
      - name: Checkout main branch
        run: git checkout main && git pull
      - name: Update Package.swift checksums
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="v${{ needs.validate.outputs.version }}"
          ZIP="output/Verity.xcframework.zip"

          cd output && zip -r Verity.xcframework.zip Verity.xcframework && cd ..
          CHECKSUM=$(swift package compute-checksum "$ZIP")
          REPO_URL=$(gh repo view --json url -q .url 2>/dev/null || echo "https://github.com/atheonxyz/verity")
          DOWNLOAD_URL="$REPO_URL/releases/download/$VERSION/Verity.xcframework.zip"

          for PKGFILE in Package.swift sdks/swift/Package.swift; do
            sed -i '' -E "s|let releaseXCFrameworkURL = \".*\"|let releaseXCFrameworkURL = \"$DOWNLOAD_URL\"|" "$PKGFILE"
            sed -i '' -E "s|let releaseXCFrameworkChecksum = \".*\"|let releaseXCFrameworkChecksum = \"$CHECKSUM\"|" "$PKGFILE"
          done

          rm -f "$ZIP"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift sdks/swift/Package.swift
          git commit -m "chore: update Package.swift checksums for v${{ needs.validate.outputs.version }}"
          git push
      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run complete. Would publish v${{ needs.validate.outputs.version }} to all platforms." >> "$GITHUB_STEP_SUMMARY"

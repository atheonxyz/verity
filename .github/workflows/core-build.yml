name: Core Build (reusable)

on:
  workflow_call:
    inputs:
      targets:
        description: "Comma-separated: ios,android,wasm,native"
        required: false
        default: "ios,android,wasm,native"
        type: string
      rust-toolchain:
        description: "Rust toolchain to use"
        required: false
        default: "nightly-2026-03-04"
        type: string
      provekit-ref:
        description: "ProveKit git ref (branch, tag, or SHA)"
        required: false
        default: "v1"
        type: string
      provekit_wasm_ref:
        description: "ProveKit git ref for WASM builds"
        required: false
        default: "main"
        type: string

jobs:
  build-ios:
    if: contains(inputs.targets, 'ios')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldfnd/provekit
          ref: ${{ inputs.provekit-ref }}
          path: provekit
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            provekit/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-ios-${{ inputs.rust-toolchain }}-${{ hashFiles('core/Cargo.lock') }}-${{ inputs.provekit-ref }}
          restore-keys: rust-ios-${{ inputs.rust-toolchain }}-
      - name: Build iOS
        run: bash core/build/build-ios.sh provekit
      - name: Record artifact sizes
        run: |
          echo "## iOS Artifact Sizes" >> "$GITHUB_STEP_SUMMARY"
          find output/ \( -name '*.a' -o -name '*.xcframework' \) -print0 | while IFS= read -r -d '' f; do
            size=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename "$f")\`: $size" >> "$GITHUB_STEP_SUMMARY"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: core-ios
          path: output/
          retention-days: 7

  build-android:
    if: contains(inputs.targets, 'android')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldfnd/provekit
          ref: ${{ inputs.provekit-ref }}
          path: provekit
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            provekit/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-android-${{ inputs.rust-toolchain }}-${{ hashFiles('core/Cargo.lock') }}-${{ inputs.provekit-ref }}
          restore-keys: rust-android-${{ inputs.rust-toolchain }}-
      - name: Build Android
        run: bash core/build/build-android.sh provekit
      - name: Build JNI shared libraries
        run: bash sdks/kotlin/scripts/build-android.sh
      - name: Record artifact sizes
        run: |
          echo "## Android Artifact Sizes" >> "$GITHUB_STEP_SUMMARY"
          find output/android \( -name '*.so' -o -name '*.a' \) -print0 | while IFS= read -r -d '' f; do
            size=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename "$(dirname "$f")")/$(basename "$f")\`: $size" >> "$GITHUB_STEP_SUMMARY"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: core-android
          path: sdks/kotlin/src/main/jniLibs/
          retention-days: 7

  build-wasm:
    if: contains(inputs.targets, 'wasm')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldfnd/provekit
          ref: ${{ inputs.provekit_wasm_ref }}
          path: provekit
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          targets: wasm32-unknown-unknown
          components: rust-src
      - name: Install wasm-pack
        run: |
          cargo install wasm-pack --locked
          cargo install wasm-bindgen-cli --locked
      - uses: actions/cache@v4
        with:
          path: |
            .build/provekit-wasm-target
            provekit/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-wasm-${{ inputs.rust-toolchain }}-${{ inputs.provekit_wasm_ref }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: rust-wasm-${{ inputs.rust-toolchain }}-
      - name: Build WASM
        run: bash core/build/build-wasm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: core-wasm
          path: output/wasm/
          retention-days: 7

  build-native:
    if: contains(inputs.targets, 'native')
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-native-${{ matrix.os }}-${{ inputs.rust-toolchain }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: rust-native-${{ matrix.os }}-${{ inputs.rust-toolchain }}-
      - name: Build native
        run: bash core/build/build-native.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: core-native-${{ matrix.os }}
          path: core/target/release/lib*.a
          retention-days: 7

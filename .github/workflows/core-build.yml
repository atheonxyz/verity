name: Core Build (reusable)

on:
  workflow_call:
    inputs:
      targets:
        description: "Comma-separated: ios,android,wasm,native,jvm"
        required: false
        default: "ios,android,wasm,native,jvm"
        type: string
      rust-toolchain:
        description: "Rust toolchain to use"
        required: false
        default: "nightly-2026-03-04"
        type: string
      provekit-ref:
        description: "ProveKit git ref (branch, tag, or SHA)"
        required: false
        default: "v1"
        type: string

jobs:
  build-ios:
    if: contains(inputs.targets, 'ios')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldfnd/provekit
          ref: ${{ inputs.provekit-ref }}
          path: provekit
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin,x86_64-apple-darwin
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            provekit/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-ios-${{ inputs.rust-toolchain }}-${{ hashFiles('core/Cargo.lock') }}-${{ inputs.provekit-ref }}
          restore-keys: rust-ios-${{ inputs.rust-toolchain }}-
      - name: Build iOS + macOS
        run: bash core/build/build-ios.sh provekit
      - name: Record artifact sizes
        run: |
          echo "## Apple Artifact Sizes" >> "$GITHUB_STEP_SUMMARY"
          find output/ \( -name '*.a' -o -name '*.xcframework' \) -print0 | while IFS= read -r -d '' f; do
            size=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename "$f")\`: $size" >> "$GITHUB_STEP_SUMMARY"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: core-ios
          path: output/
          retention-days: 7

  build-android:
    if: contains(inputs.targets, 'android')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldfnd/provekit
          ref: ${{ inputs.provekit-ref }}
          path: provekit
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            provekit/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-android-${{ inputs.rust-toolchain }}-${{ hashFiles('core/Cargo.lock') }}-${{ inputs.provekit-ref }}
          restore-keys: rust-android-${{ inputs.rust-toolchain }}-
      - name: Build Android
        run: bash core/build/build-android.sh provekit
      - name: Record artifact sizes
        run: |
          echo "## Android Artifact Sizes" >> "$GITHUB_STEP_SUMMARY"
          find output/android \( -name '*.so' -o -name '*.a' \) -print0 | while IFS= read -r -d '' f; do
            size=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename "$(dirname "$f")")/$(basename "$f")\`: $size" >> "$GITHUB_STEP_SUMMARY"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: core-android
          path: output/android/
          retention-days: 7

  build-wasm:
    if: contains(inputs.targets, 'wasm')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-wasm-${{ inputs.rust-toolchain }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: rust-wasm-${{ inputs.rust-toolchain }}-
      - name: Build WASM
        run: bash core/build/build-wasm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: core-wasm
          path: output/wasm/
          retention-days: 7

  build-jvm:
    if: contains(inputs.targets, 'jvm')
    strategy:
      matrix:
        include:
          - os: macos-14
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: ubuntu-latest
            rust-targets: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldfnd/provekit
          ref: ${{ inputs.provekit-ref }}
          path: provekit
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          targets: ${{ matrix.rust-targets }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            provekit/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-jvm-${{ matrix.os }}-${{ inputs.rust-toolchain }}-${{ hashFiles('core/Cargo.lock') }}-${{ inputs.provekit-ref }}
          restore-keys: rust-jvm-${{ matrix.os }}-${{ inputs.rust-toolchain }}-
      - name: Build Rust static libs
        run: |
          IFS=',' read -ra TARGETS <<< "${{ matrix.rust-targets }}"
          for target in "${TARGETS[@]}"; do
            echo "Building provekit-ffi for $target..."
            cd provekit && cargo build --release --target "$target" -p provekit-ffi && cd ..
            echo "Building barretenberg-ffi for $target..."
            cd core && cargo build --release --target "$target" -p barretenberg-ffi && cd ..
          done
      - name: Build JVM shared libraries
        run: bash core/build/build-jvm.sh provekit
      - uses: actions/upload-artifact@v4
        with:
          name: core-jvm-${{ matrix.os }}
          path: output/jvm/
          retention-days: 7

  build-native:
    if: contains(inputs.targets, 'native')
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
      - uses: actions/cache@v4
        with:
          path: |
            core/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-native-${{ matrix.os }}-${{ inputs.rust-toolchain }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: rust-native-${{ matrix.os }}-${{ inputs.rust-toolchain }}-
      - name: Build native
        run: bash core/build/build-native.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: core-native-${{ matrix.os }}
          path: core/target/release/lib*.a
          retention-days: 7

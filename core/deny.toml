[advisories]
vulnerability = "deny"
unmaintained = "workspace"
yanked = "deny"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "workspace"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "allow"

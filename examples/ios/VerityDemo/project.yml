name: VerityDemo
options:
  bundleIdPrefix: com.atheon
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

packages:
  Verity:
    # For standalone use: url: https://github.com/atheonxyz/verity, from: "0.2.0"
    path: ../../../sdks/swift

targets:
  VerityDemo:
    type: application
    platform: iOS
    sources:
      - path: VerityDemo
        excludes:
          - Resources
      - path: VerityDemo/Resources
        type: folder
        buildPhase: resources
    dependencies:
      - package: Verity
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.atheon.verity.demo
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_LSRequiresIPhoneOS: true
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"

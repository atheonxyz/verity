name: VerityDemo
options:
  bundleIdPrefix: com.atheon
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

packages:
  Verity:
    # For standalone use: url: https://github.com/atheonxyz/verity, from: "0.2.0"
    path: ../../../sdks/swift

targets:
  VerityDemo:
    type: application
    platform: iOS
    sources:
      - path: VerityDemo
        excludes:
          - Info.plist
    dependencies:
      - package: Verity
    info:
      path: VerityDemo/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.atheon.verity.demo
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGN_STYLE: Automatic
      # Set your team: DEVELOPMENT_TEAM: YOUR_TEAM_ID
